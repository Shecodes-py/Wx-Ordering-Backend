<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backend Core</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            color: #333;
        }
        .card {
            background: white;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        h1 { color: #6c63ff; margin-bottom: 10px; }
        p { color: #777; margin-bottom: 30px; }
        .links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .btn {
            text-decoration: none;
            background: #6c63ff;
            color: white;
            padding: 12px;
            border-radius: 10px;
            transition: transform 0.2s, background 0.2s;
            font-weight: bold;
        }
        .btn:hover {
            background: #5751d9;
            transform: translateY(-2px);
        }
        .btn-secondary {
            background: #eee;
            color: #555;
        }
        .btn-secondary:hover {
            background: #ddd;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>HEY there✨</h1>
        <p>The backend is up and running smoothly. </p>
        <p> Ella  </p>
        
        <div class="links">
            <a href="api/schema/swagger-ui/" class="btn">View Swagger Docs</a>
            <a href="api/schema/" class="btn btn-secondary">Download Docs</a>
            <a href="api/schema/redoc/" class="btn btn-secondary">View Swagger Redoc</a>
            <a href="/admin/" class="btn btn-secondary">Admin Panel</a>
        </div>
    </div>

</body>
</html>
